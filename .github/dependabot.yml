version: 2
updates:
  # Keep the sha-pinned actions in .github/workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"

  # Viewer dependencies (bun.lock in web/).
  - package-ecosystem: "bun"
    directory: "/web"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      bun:
        patterns:
          - "*"

  # v8 submodule pin.
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      v8:
        patterns:
          - "*"
