name: benchmarks

on:
  workflow_dispatch:
    inputs:
      filter:
        description: Only run bench folders whose name contains this substring
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "bench/**"
      - "scripts/**"
      - "web/**"
      - ".github/workflows/bench.yml"

permissions:
  contents: read

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      plan: ${{ steps.plan.outputs.plan }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Resolve versions and benches
        id: plan
        env:
          BENCH_FILTER: ${{ inputs.filter }}
        run: node scripts/plan.mjs

  build:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.plan.outputs.plan).versions }}
    name: build d8 (${{ matrix.version.spec }})
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Restore previously built d8
        id: d8-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: d8-out
          key: d8-${{ runner.os }}-${{ matrix.version.sha }}-${{ hashFiles('scripts/build-d8.sh') }}

      - name: Free disk space
        if: steps.d8-cache.outputs.cache-hit != 'true'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force
          df -h /

      - name: Build d8
        if: steps.d8-cache.outputs.cache-hit != 'true'
        env:
          SOURCE: ${{ matrix.version.source }}
          REF: ${{ matrix.version.ref }}
          SHA: ${{ matrix.version.sha }}
        run: scripts/build-d8.sh "$SOURCE" "$REF" "$SHA" "$PWD/d8-out"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: d8-${{ matrix.version.key }}
          path: d8-out
          if-no-files-found: error

  bench:
    needs: [plan, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.plan.outputs.plan).versions }}
    name: bench (${{ matrix.version.spec }})
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Write plan file
        env:
          PLAN: ${{ needs.plan.outputs.plan }}
        run: printf '%s' "$PLAN" > plan.json

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: d8-${{ matrix.version.key }}
          path: d8-bin/d8-${{ matrix.version.key }}

      - name: Run benchmarks for this version
        env:
          VERSION_KEY: ${{ matrix.version.key }}
        run: |
          chmod +x d8-bin/d8-*/d8
          node scripts/measure.mjs --plan plan.json --version-key "$VERSION_KEY" --d8-root d8-bin --out measurements

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: measurements-${{ matrix.version.key }}
          path: measurements
          if-no-files-found: error

  merge:
    needs: [plan, bench]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Write plan file
        env:
          PLAN: ${{ needs.plan.outputs.plan }}
        run: printf '%s' "$PLAN" > plan.json

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: measurements-*
          path: measurements

      - name: Merge measurements into comparison results
        run: node scripts/merge-results.mjs --plan plan.json --measurements-root measurements --out results

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-results
          path: results
          if-no-files-found: error

  deploy:
    needs: merge
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bench-results
          path: results

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install viewer dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Inject benchmark results
        run: |
          rm -f web/src/data/results/*.json
          cp results/*.json web/src/data/results/

      - name: Build viewer
        working-directory: web
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /${{ github.event.repository.name }}
        run: bun run build

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
